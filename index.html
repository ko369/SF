/* Pattern A top sections */
.sf-top-main{max-width:1280px;margin:0 auto;padding:28px 30px 76px}.sf-top-section{margin:0 0 42px}.sf-top-section>.section-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;padding:0 2px 11px;border-bottom:1px solid var(--line-soft)}.section-title{margin:0;padding-left:12px;border-left:4px solid var(--navy);font-size:19px;line-height:1.35;font-weight:800;letter-spacing:-.02em;color:var(--ink)}.sf-section-desc{margin:6px 0 0 16px;font-size:12.2px;line-height:1.7;color:var(--muted);letter-spacing:-.01em;max-width:680px}.more{font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap}.more:hover{color:var(--navy)}.sf-card-group{margin-top:18px}.sf-card-group+.sf-card-group{margin-top:28px}.sf-subhead,.sf-mini-subhead{display:flex;align-items:center;gap:9px;font-size:13px;line-height:1.4;font-weight:800;margin:0 0 10px;color:var(--ink);letter-spacing:-.01em}.sf-subhead:before,.sf-mini-subhead:before{content:'';width:7px;height:7px;border-radius:999px;background:var(--navy);opacity:.9;flex:0 0 auto}.sf-subhead small{font-size:11px;font-weight:600;color:var(--muted);margin-left:2px}.sf-card-row{display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;padding:2px 2px 12px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}.sf-card-row::-webkit-scrollbar{height:6px}.sf-card-row::-webkit-scrollbar-thumb{background:#D2D8E0;border-radius:999px}.sf-activity-card{--card-line:var(--navy);background:#fff;border:1px solid #DDE3EA;border-top:2px solid var(--card-line);border-radius:7px;padding:12px 14px 13px;min-height:152px;width:272px;min-width:272px;display:flex;flex-direction:column;box-shadow:none;overflow:hidden;cursor:pointer;transition:border-color .14s,transform .14s,box-shadow .14s;scroll-snap-align:start}.sf-activity-card:hover{transform:translateY(-1px);border-color:#C7D0DC;box-shadow:0 5px 16px rgba(16,32,51,.07)}.sf-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;white-space:nowrap;min-width:0}.sf-card-label{display:inline-flex;align-items:center;background:#F2F5F8;border-radius:4px;padding:3px 8px;font-size:10.5px;font-weight:800;color:#263548;line-height:1.1}.sf-card-date{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.02em}.sf-company{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--ink);line-height:1.35;margin-bottom:5px;min-width:0}.sf-dot{width:6px;height:6px;border-radius:50%;background:var(--card-line);flex:0 0 auto}.sf-company span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sf-card-title{font-size:12.7px;font-weight:800;color:var(--ink);line-height:1.55;margin:0 0 8px;letter-spacing:-.005em;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.sf-card-desc{font-size:11.3px;color:var(--sub);line-height:1.65;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.sf-card-foot{margin-top:auto;padding-top:12px;font-size:11px;color:var(--muted);display:flex;gap:10px;align-items:center}.sf-card-foot a{color:var(--navy);font-weight:800;text-decoration:none}.sf-card-foot a:hover{text-decoration:underline}.sf-card-foot .muted{color:var(--muted)}.sf-story-card{min-height:166px;padding:14px 15px;background:linear-gradient(180deg,#fff 0%,#FFFDF8 100%)}.sf-story-card .sf-card-title{font-size:13px;line-height:1.62;-webkit-line-clamp:4}
/* === stage tabs section: Pattern A / series focus === */
.sf-stage-section{
  margin:0 0 40px;
  padding:20px;
  border:1px solid var(--line-soft, #ECEFF3);
  border-radius:24px;
  background:
    radial-gradient(circle at 8% 10%, rgba(18,52,90,.07), transparent 28%),
    linear-gradient(135deg, #FFFDF9 0%, #F7FAFD 100%);
  box-shadow:0 10px 28px rgba(16,32,51,.045);
}
.sf-stage-head{
  display:flex;

  gap:18px;

}
.sf-stage-kicker{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.06em;
  color:var(--navy, #12345A);
  font-weight:800;
  margin-bottom:7px;
}
.sf-stage-kicker::before{
  content:'';
  width:6px;

  background:var(--accent, #B58A4A);
}
.sf-stage-title{
  margin:0;
  font-size:21px;
  line-height:1.42;

  color:var(--ink, #102033);
}
.sf-stage-lead{
  margin:6px 0 0;
  font-size:12.5px;
  line-height:1.75;
  color:var(--sub, #4C5B6E);

}
.sf-stage-actions{
  display:flex;
  gap:8px;
  flex:0 0 auto;
}
.sf-stage-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  min-height:34px;
  border:1px solid #CBD4DF;
  background:rgba(255,255,255,.78);

  display:grid;

  border:1px solid var(--line, #DDE3EA);
  border-radius:16px 16px 0 0;
  background:rgba(255,255,255,.78);
}
.sf-stage-tab{
  position:relative;
  appearance:none;
  border:0;
  border-left:1px solid var(--line-soft, #ECEFF3);
  background:transparent;
  color:var(--ink, #102033);
  padding:12px 10px 11px;
  cursor:pointer;
  text-align:center;
}
.sf-stage-tab:first-child{border-left:0}
.sf-stage-tab b{
  display:block;
  font-family:var(--mono);
  font-size:12px;
  font-weight:800;
  line-height:1.1;
  letter-spacing:-.02em;
}
.sf-stage-tab span{
  display:block;
  margin-top:5px;
  font-size:10.5px;
  line-height:1.2;
  color:var(--muted, #7A8494);
  font-weight:700;
}
.sf-stage-tab.active{
  background:var(--navy-2, #0B223C);
  color:#fff;
  box-shadow:inset 0 -3px 0 rgba(181,138,74,.9);
}
.sf-stage-tab.active span{color:rgba(255,255,255,.70)}
.sf-stage-panel{
  border:1px solid var(--line, #DDE3EA);
  border-top:0;
  border-radius:0 0 18px 18px;
  background:rgba(255,255,255,.92);
  overflow:hidden;
}

  display:grid;
  grid-template-columns:240px minmax(0,1fr);

}
.sf-stage-intro{
  border-right:1px solid var(--line-soft, #ECEFF3);

}

.sf-stage-card-row{
  min-width:0;
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:2px 2px 12px;
  scroll-snap-type:x proximity;

.sf-stage-card-row::-webkit-scrollbar{height:6px}
.sf-stage-card-row::-webkit-scrollbar-thumb{background:#D2D8E0;border-radius:999px}
.sf-stage-company-card{
  width:238px;
  min-width:238px;
  min-height:154px;
  display:flex;
  flex-direction:column;
  scroll-snap-align:start;
  border:1px solid var(--line-soft, #ECEFF3);

  display:block;
  margin-bottom:10px;
}

  display:none;
}
.sf-stage-round{
  display:inline-flex;
  align-items:center;
  align-self:flex-start;
  font-family:var(--mono);
  font-size:10px;
  font-weight:800;
  color:var(--stage-color, #12345A);
  background:color-mix(in srgb, var(--stage-color, #12345A) 9%, white);
  border:1px solid color-mix(in srgb, var(--stage-color, #12345A) 16%, #E6E9EE);
  border-radius:999px;
  padding:4px 8px;
  white-space:nowrap;
}

  margin:0 0 7px;
  font-size:14px;
  line-height:1.35;
  color:var(--ink, #102033);
  letter-spacing:-.01em;
}
.sf-stage-company-card p{
  margin:0;
  font-size:11.5px;
  line-height:1.65;
  color:var(--sub, #4C5B6E);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.sf-stage-tags{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  margin-top:auto;
  padding-top:13px;
}
.sf-stage-tags span{
  display:inline-flex;
  border:1px solid var(--line-soft, #ECEFF3);
  background:#F8FAFC;
  border-radius:999px;
  padding:3px 8px;
  font-size:10px;
  line-height:1.1;
  font-weight:800;
  color:var(--sub, #4C5B6E);
}
.sf-stage-cta-card{
  width:178px;
  min-width:178px;
  min-height:176px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  gap:8px;
  scroll-snap-align:start;
  border:1px dashed #C7D1DD;
  background:#F6F8FB;
  border-radius:15px;
  padding:14px;
  color:var(--navy, #12345A);
  cursor:pointer;
}
.sf-stage-cta-icon{
  display:none;
}
.sf-stage-cta-card b{
  font-size:12.5px;
  line-height:1.55;
}
.sf-stage-cta-card span{
  font-size:11px;
  color:var(--muted, #7A8494);
}
@media(max-width:960px){
  .sf-stage-head{display:block}
  .sf-stage-actions{margin-top:12px}
  .sf-stage-tabs{display:flex;overflow-x:auto;border-radius:16px 16px 0 0}
  .sf-stage-tab{min-width:144px;flex:0 0 144px}
  .sf-stage-panel-inner{grid-template-columns:1fr}
  .sf-stage-intro{border-right:0;border-bottom:1px solid var(--line-soft, #ECEFF3);padding:0 0 15px}
}
@media(max-width:640px){
  .sf-stage-section{padding:15px;border-radius:19px;margin-bottom:32px}
  .sf-stage-title{font-size:18px}
  .sf-stage-lead{font-size:11.8px}
  .sf-stage-tabs{margin-left:-1px;margin-right:-1px}
  .sf-stage-tab{min-width:132px;flex-basis:132px;padding:11px 8px}
  .sf-stage-tab b{font-size:11px}
  .sf-stage-tab span{font-size:10px}
  .sf-stage-panel-inner{padding:14px}
  .sf-stage-intro h3{font-size:18px}
  .sf-stage-company-card{width:230px;min-width:230px;min-height:150px}
}

/* Growth cards */

<body>
<header class="topbar">
  <a data-nav-top href="./"><strong>StartupFile</strong></a>
  <span class="tagline" id="topbar-sub">日本のスタートアップの変化を、数字・出来事・資料から見る</span>
  <nav>
    <a class="view-tab" id="tab-top" data-nav-top href="./">トップ</a>
    <a class="view-tab" id="tab-detail" href="?view=detail&id=c0001">詳細</a>
  </nav>
</header>
<div id="app"><div class="loading">読み込み中...</div></div>
<footer class="footer">StartupFile / DB prototype</footer>
<script>
(function(){
'use strict';
const API_URL = document.documentElement.dataset.apiUrl || '';
const STATE = { top:null, companies:[], companyCache:Object.create(null), currentId:null, currentTab:'focus', loading:false };
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const app = $('#app');
function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function clean(v){ return String(v == null ? '' : v).trim(); }
function num(v){ const n = Number(String(v||'').replace(/,/g,'')); return Number.isFinite(n) ? n : null; }
function color(v){ return /^#[0-9a-f]{3,8}$/i.test(clean(v)) ? clean(v) : '#12345A'; }
function idOf(x){ return clean(x && (x.company_id || x.cid || x.id || x.biz_id)); }
function first(){ for(let i=0;i<arguments.length;i++){ const v=arguments[i]; if(clean(v)) return v; } return ''; }
function trim(s,n){ s=clean(s); return s.length>n ? s.slice(0,n)+'…' : s; }
function dateLabel(v){ const s=clean(v); if(!s) return ''; const d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10).replace(/-/g,'.'); return s; }
function shortDate(v){ const s=dateLabel(v); return s ? s.slice(0,10) : '—'; }
function latestByYear(arr){ return (arr||[]).filter(Boolean).slice().sort((a,b)=>(num(a.year)||0)-(num(b.year)||0)).pop() || null; }
function makeUrl(params){ const u = new URL(location.pathname, location.origin); Object.keys(params||{}).forEach(k=>{ if(params[k]!==undefined && params[k]!==null && params[k]!=='') u.searchParams.set(k, params[k]); }); return u.pathname + u.search; }
function detailHref(id, tab){ return makeUrl({ view:'detail', id:id || 'c0001', tab:tab || 'focus' }); }
function topHref(){ return location.pathname; }
async function fetchJson(params){
  if(!API_URL) throw new Error('data-api-url が未設定です');
  const u = new URL(API_URL);
  Object.keys(params||{}).forEach(k=>{ if(params[k]!==undefined && params[k]!==null) u.searchParams.set(k, params[k]); });
  const res = await fetch(u.toString(), { cache:'no-store' });
  if(!res.ok) throw new Error('API HTTP '+res.status);
  const json = await res.json();
  if(json && json.error) throw new Error(json.error);
  return json;
}
async function loadTop(){
  if(STATE.top) return STATE.top;
  try{
    STATE.top = await fetchJson({ toppage:1 });
  }catch(e){
    console.warn('[StartupFile] GAS toppage failed, trying local fallback', e);
    const res = await fetch('data/top.json', {cache:'no-store'});
    STATE.top = await res.json();
  }
  STATE.companies = Array.isArray(STATE.top.companies) ? STATE.top.companies : ((STATE.top.shelves && STATE.top.shelves.companies) || []);
  return STATE.top;
}
async function loadCompany(id){
  id = id || 'c0001';
  if(STATE.companyCache[id]) return STATE.companyCache[id];
  let json;
  try{
    json = await fetchJson({ id:id, news:1 });
  }catch(e){
    console.warn('[StartupFile] GAS company failed, trying local fallback', e);
    const res = await fetch('data/'+encodeURIComponent(id)+'.json', {cache:'no-store'});
    json = await res.json();
  }
  const c = json.company || json;
  if(!c || (!c.company && !c.name)) throw new Error('company not found: '+id);
  STATE.companyCache[id] = c;
  return c;
}
function setActive(isDetail){ $('#tab-top').classList.toggle('active', !isDetail); $('#tab-detail').classList.toggle('active', isDetail); }
function push(url){ history.pushState(null, '', url); route(); }
function replace(url){ history.replaceState(null, '', url); }
function appLoading(text){ app.innerHTML = '<div class="loading">'+esc(text||'読み込み中...')+'</div>'; }
function appError(err){ app.innerHTML = '<div class="error"><b>表示できませんでした。</b><br>'+esc(err && err.message ? err.message : err)+'</div>'; }
async function route(){
  try{
    await loadTop();
    const q = new URLSearchParams(location.search);
    const view = q.get('view');
    const id = q.get('id');
    const tab = q.get('tab') || 'focus';
    if(view === 'detail' && id){ await showDetail(id, tab); }
    else { showTop(); }
  }catch(e){ console.error(e); appError(e); }
}
function topSections(){ const t=STATE.top||{}; const s=t.top_sections||{}; const old=t.shelves||{}; return { s, old }; }
function normalizeFeatured(items){ return (items||[]).map(x=>({ company:x.company||x.name, company_id:idOf(x), color:x.color, label:'注目企業', date_label:'', title:first(x.reason,x.mission,x.summary,'注目企業'), desc:first(x.mission,x.summary,x.reason), url:x.url, type:'activity' })); }
function normalizeTopic(items,label){ return (items||[]).map(x=>({ company:x.company||x.name, company_id:idOf(x), color:x.color, label:label||x.type||'TOPIC', date_label:x.date||x.year, title:first(x.title,x.reason,x.company), desc:first(x.desc,x.summary,x.sector1), url:x.url, type:'activity' })); }
function normalizeGrowth(items){ return (items||[]).map(x=>Object.assign({label:'組織拡大',type:'growth'},x,{date_label:x.latest_year?x.latest_year+'年時点':''})); }
function normalizeFunding(items){ return (items||[]).map(x=>Object.assign({label:'資金調達',type:'funding'},x,{title:first(x.title, x.amount_text ? x.amount_text+'の資金調達' : ''), desc:first(x.desc,x.note)})); }
function normalizeDeck(items){ return (items||[]).map(x=>({ company:x.company||x.name, company_id:idOf(x), color:x.color, label:'資料', title:'会社紹介・カルチャーデックを見る', desc:first(x.sector1,'会社の考え方や組織づくりを資料から確認します。'), url:x.deck_url||x.url, type:'activity' })); }
function sectionGroups(name){
  const {s, old} = topSections();
  if(name==='weekly') return s.weekly ? [['Series C以降・上場後',s.weekly.later_stage],['Series A/B・これから伸びる企業',s.weekly.early_stage]] : [['注目企業', normalizeFeatured(old.featured||[])]];
  if(name==='growth') return s.growth ? [['社員数の伸びから見る注目企業',s.growth.headcount],['資金調達の動きから見る',s.growth.funding],['次の発表が気になる企業',s.growth.next_signal]] : [['社員数の伸びから見る注目企業',normalizeGrowth(old.growing||[])],['資金調達の動きから見る',normalizeFunding(old.funding||[])]];
  if(name==='learning') return s.learning ? [['事業・届き方から見る',[...(s.learning.business||[]),...(s.learning.delivery||[])]],['組織・働き方から見る',[...(s.learning.org||[]),...(s.learning.workstyle||[])]],['創業の思い・転換点から見る',[...(s.learning.founder||[]),...(s.learning.turning||[])]]] : [['事業・届き方から見る',normalizeTopic(old.product||[],'事業')],['組織・働き方から見る',normalizeTopic(old.org||[],'組織')],['転換点から見る',normalizeTopic(old.turning||[],'転換点')]];
  if(name==='thoughts') return s.thoughts ? [['創業の背景から見る',s.thoughts.founder],['事業思想から見る',s.thoughts.philosophy],['目指す世界から見る',s.thoughts.future]] : [];
  if(name==='recent') return s.recent ? [['経営体制の変化から見る',s.recent.management],['新サービス・新機能から見る',s.recent.product],['事業提携から見る',s.recent.partnership]] : [];
  return [];
}
function showTop(){
  setActive(false);
  $('#topbar-sub').textContent = '知らない会社を、少し好きになる入口。';
  const meta = STATE.top.meta || {};

function materialCard(x){ return '<a class="detail-material-card" data-source-link href="'+esc(x.url)+'" target="_blank" rel="noopener"><span class="detail-material-type">'+esc(first(x.type,x.label,'資料'))+'</span><b>'+esc(first(x.title,x.label,'資料を見る'))+'</b><p>'+esc(first(x.desc,'会社理解に使える一次情報です。'))+'</p><span class="detail-material-link">開く ↗</span></a>'; }
function renderSidebar(){
  const list=$('#sidebarList'), count=$('#sbCount'); if(!list) return;
  const render=(q='')=>{ const qq=q.toLowerCase().trim(); const items=STATE.companies.filter(c=>!qq || [c.name,c.company,c.summary,c.sector1,c.sector2].some(v=>clean(v).toLowerCase().includes(qq))).slice(0,400); if(count) count.textContent=items.length+'社'; list.innerHTML=items.map(c=>'<div class="sb-item '+(idOf(c)===STATE.currentId?'active':'')+'" data-company-id="'+esc(idOf(c))+'"><h4>'+esc(first(c.name,c.company,idOf(c)))+'</h4><p>'+esc(first(c.sector1,c.summary,''))+'</p></div>').join('') || '<div class="empty">該当する企業がありません</div>'; };
  render(); const inp=$('#sidebarSearch'); if(inp) inp.addEventListener('input',()=>render(inp.value));
}
function setDetailTab(tab,pushUrl=true){
  tab = tab || 'focus'; STATE.currentTab = tab;
  $$('.co-tab').forEach(b=>b.classList.toggle('active', b.dataset.detailTab===tab));
  const c=STATE.companyCache[STATE.currentId]; if($('#detailFrame')&&c) $('#detailFrame').innerHTML = renderDetailPanel(c, tab);
  if(pushUrl) replace(detailHref(STATE.currentId,tab));
}
function renderDetailPanel(c,tab){
  if(tab==='growth') return panelGrowth(c);
  if(tab==='timeline') return panelTimeline(c);
  if(tab==='news') return panelNews(c);
  if(tab==='links') return panelLinks(c);
  return panelFocus(c);
}
function panelFocus(c){
  const head=latestByYear(c.headcount||[]), fund=latestByYear(c.funding||[]);
  return '<section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">この会社を見るための視点</h2></div><div class="rich-kpi-grid">'+
    kpi('設立',c.founded||'—','会社の年齢を見る')+kpi('社員数',head&&head.count?head.count+'名':'—',head&&head.year?head.year+'年時点':'')+kpi('累計調達',c.raised_total||c.raised||'—',c.latest_round||c.rounds||'')+kpi('領域',c.sector1||'—',c.sector2||'')+'</div></section>'+
    '<section class="detail-section"><div class="co-highlights"><div class="co-highlights-label">まず見るところ</div><div class="co-highlights-grid">'+whyCards(c,head,fund).join('')+'</div></div></section>'+
    '<section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">関連する重要トピックス</h2></div><div class="timeline-rich">'+(c.topics||[]).slice(0,8).map(topicRow).join('')+'</div></section>';
}
function kpi(label,val,sub){ return '<div class="rich-kpi"><div class="label">'+esc(label)+'</div><div class="val">'+esc(val)+'</div><div class="sub">'+esc(sub||'')+'</div></div>'; }
function whyCards(c,head,fund){ const cards=[]; cards.push(['事業','何を変えようとしているか',first(c.summary,c.mission,'事業概要はDB補強後に表示します。')]); if(head) cards.push(['成長','組織の伸び',head.year+'年時点で'+head.count+'名。社員数推移からフェーズ変化を見ます。']); if(fund) cards.push(['調達','次のフェーズ',fund.year+'年の'+first(fund.round,'資金調達')+'を起点に、次の成長テーマを見ます。']); if((c.topics||[]).length) cards.push(['出来事','重要トピックス',c.topics.length+'件のトピックスから、創業・事業・組織の変化を確認します。']); if(c.sector1) cards.push(['領域','比較の入口',c.sector1+'領域の他社と比較して見ます。']); cards.push(['資料','一次情報',materials(c).length ? '公式資料・採用・サービスページから会社の考え方を確認できます。' : '公式資料URLはDB補強後に表示できます。']); return cards.slice(0,6).map(x=>'<article class="why-card"><div class="why-card-head"><div class="why-card-kicker">'+esc(x[0])+'</div><div class="why-card-title">'+esc(x[1])+'</div></div><div class="why-card-body">'+esc(trim(x[2],150))+'</div></article>'); }
function panelGrowth(c){ const heads=(c.headcount||[]).slice().sort((a,b)=>(num(a.year)||0)-(num(b.year)||0)); const funds=(c.funding||[]).slice().sort((a,b)=>(num(a.year)||0)-(num(b.year)||0)); return '<section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">成長推移</h2></div><div class="rich-kpi-grid">'+heads.slice(-4).map(h=>kpi(h.year+'年',h.count? h.count+'名':'—',h.source_text||h.source_method||'')).join('')+'</div></section><section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">資金調達推移</h2></div><div class="timeline-rich">'+funds.map(f=>'<article class="tl-item"><div class="tl-date">'+esc(f.year||'')+'</div><div class="tl-cat">'+esc(f.round||'調達')+'</div><div><h3>'+esc(first(f.amount,'金額非公開'))+'</h3><p>'+esc(first(f.note,f.source_text,''))+'</p></div><div class="tl-why">'+(f.source_url?'<a data-source-link href="'+esc(f.source_url)+'" target="_blank" rel="noopener">出典 ↗</a>':'出典未設定')+'</div></article>').join('')+'</div></section>'; }
function panelTimeline(c){ const topics=(c.topics||[]).slice().sort((a,b)=>(num(b.year)||0)-(num(a.year)||0)); return '<section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">タイムライン</h2></div><div class="timeline-rich">'+(topics.length?topics.map(topicRow).join(''):'<div class="empty">トピックスはDB補強後に表示されます。</div>')+'</div></section>'; }
function topicRow(t){ return '<article class="tl-item"><div class="tl-date">'+esc(first(t.date,t.year,''))+'</div><div class="tl-cat">'+esc(first(t.type,'topic'))+'</div><div><h3>'+esc(first(t.title,'トピックス'))+'</h3><p>'+esc(first(t.desc,t.speaker,t.source,''))+'</p></div><div class="tl-why">'+(t.url?'<a data-source-link href="'+esc(t.url)+'" target="_blank" rel="noopener">情報ソース ↗</a>':'会社理解の補助情報')+'</div></article>'; }
function panelNews(c){ const news=(c.news_items||[]).slice(0,30); return '<section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">最近のニュース</h2></div><div class="news-rich-grid">'+(news.length?news.map(n=>'<article class="news-rich-item"><div class="meta"><span>'+esc(dateLabel(n.date))+'</span><span>'+esc(first(n.source_label,n.source,''))+'</span></div><h3>'+esc(n.title||'ニュース')+'</h3><p>'+esc(first(n.desc,'保存済みニュースから表示しています。'))+'</p>'+(n.url?'<div class="sf-card-foot"><a data-source-link href="'+esc(n.url)+'" target="_blank" rel="noopener">記事を開く ↗</a></div>':'')+'</article>').join(''):'<div class="empty">保存済みニュースはまだありません。GASのニュース更新後に表示されます。</div>')+'</div></section>'; }
function panelLinks(c){ const mats=materials(c); const sources=[...(c.news_sources||[]),...(c.news_links||[])]; return '<section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">資料・リンク</h2></div><div class="link-grid">'+(mats.length?mats.map(x=>'<a class="link-card" data-source-link href="'+esc(x.url)+'" target="_blank" rel="noopener"><b>'+esc(first(x.label,x.title,'リンク'))+'</b><span>'+esc(first(x.desc,'一次情報を開く'))+'</span></a>').join(''):'<div class="empty">公式リンクはDB補強後に表示されます。</div>')+'</div></section><section class="detail-section"><div class="detail-section-head"><h2 class="detail-section-title">ニュース収集元</h2></div><div class="source-ledger">'+(sources.length?sources.map(s=>'<div class="source-ledger-row"><div class="kind">'+esc(s.type||s.mode||'source')+'</div><div><b>'+esc(s.label||s.title||'収集元')+'</b><p>'+esc(s.url||s.query||'')+'</p></div><div class="trust">'+esc(s.mode||'link')+'</div></div>').join(''):'<div class="empty">ニュース収集元は未設定です。</div>')+'</div></section>'; }
document.addEventListener('click', e=>{
  const src = e.target.closest('[data-source-link]'); if(src) return;
  const top = e.target.closest('[data-nav-top]'); if(top){ e.preventDefault(); push(topHref()); return; }
  const stageTab = e.target.closest('[data-stage-tab]'); if(stageTab){ e.preventDefault(); renderStagePanel(stageTab.dataset.stageTab || 'seed'); return; }
  const tab = e.target.closest('[data-detail-tab]'); if(tab){ e.preventDefault(); setDetailTab(tab.dataset.detailTab, true); return; }
  const card = e.target.closest('[data-company-id]'); if(card){ const id=card.dataset.companyId; if(id){ e.preventDefault(); push(detailHref(id,'focus')); } return; }
});
window.addEventListener('popstate', route);
route();
})();
</script>
</body>
</html>
