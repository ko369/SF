<!DOCTYPE html>
<!-- ============================================================
     ★ここだけ設定してください★
     下の <html ... data-api-url="..."> の "" の中に、
     GASで発行したウェブアプリURL（末尾が /exec のもの）を貼り付けます。
     例: data-api-url="https://script.google.com/macros/s/AKfyc..../exec"
     空のままだと「データが表示されない」状態になります。
     ============================================================ -->
<html lang="ja" data-api-url="https://script.google.com/macros/s/AKfycbzzRfW419IKvKBIGtOjihhshYfd8jGPv8vCMWlJjE2w0b1tRWfYPyfWsGAP2_KJ2hWd/exec">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>企業詳細 — DB版</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--bg-card:#fff;--bg-deep:#F5F5F5;--bg-muted:#EEEEEE;
  --text:#1A1814;--text-sub:#5A5650;--text-mute:#767269;
  --border:#E0E0E0;--border-sub:#EBEBEB;
  --teal:#0F7A64;--teal-l:#E5F5F1;
  --blue:#1A5EC2;--blue-l:#E8EFFC;
  --amber:#A86010;--amber-l:#FBF0E3;
  --red:#C02020;--red-l:#FDEAEA;
  --purple:#5A3FBF;--purple-l:#F0ECFF;
  --green:#1A7A3C;--green-l:#E5F5EC;
  --mono:'DM Mono',monospace;
  --sans:'Noto Sans JP',sans-serif;
  --r:7px;--shadow:0 2px 10px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.7}

.frame{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOP BAR */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 32px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-mute);font-family:var(--mono);flex-shrink:0}
.topbar a{color:var(--blue);text-decoration:none}
.topbar-name{color:var(--text-sub);font-weight:500}
.topbar-close{margin-left:auto;width:22px;height:22px;border-radius:50%;background:var(--bg-muted);border:none;cursor:pointer;font-size:13px;color:var(--text-mute)}

/* HEADER */
.co-header{background:var(--bg);border-bottom:1px solid var(--border);padding:16px 32px 0;flex-shrink:0}
.co-header-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:12px}
.co-company-name{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:7px;white-space:nowrap;overflow:hidden;max-width:200px;text-overflow:ellipsis}
.co-kpi-row{display:flex;gap:24px;align-items:baseline}
.co-kpi-label{font-family:var(--mono);font-size:11px;color:var(--text-mute);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.co-kpi-val{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.co-kpi-sub{font-family:var(--mono);font-size:10px;color:var(--teal);margin-top:2px}
.co-mission{font-size:19px;font-weight:700;line-height:1.4;color:var(--text);padding:12px 0 14px;letter-spacing:-.01em}
.co-overview{font-size:13px;color:var(--text-sub);line-height:1.8;margin-bottom:12px}

/* LINKS */
.co-links-wrap{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
.co-links-row{display:flex;gap:6px;flex-wrap:wrap}
.co-link{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:11px;color:var(--text);transition:all .15s;cursor:pointer;text-decoration:none}
.co-link:hover{background:var(--blue-l);border-color:var(--blue)}
.co-link.disabled{opacity:.4;pointer-events:none}
.co-link-arrow{font-size:9px;color:var(--text-mute)}

/* ACCORDION */
.accordion-trigger{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;border-top:1px solid var(--border-sub);padding:9px 0;cursor:pointer}
.accordion-trigger:hover .accordion-title{color:var(--text)}
.accordion-title{font-size:13px;font-weight:700;color:var(--text);font-family:var(--sans);transition:color .15s}
.accordion-chevron{font-size:11px;color:var(--text-mute);transition:transform .22s;display:inline-block}
.accordion-chevron.open{transform:rotate(180deg)}
.accordion-body{overflow:hidden;max-height:0;transition:max-height .35s ease,opacity .25s;opacity:0}
.accordion-body.open{max-height:520px;opacity:1}
.acc-categories{padding:8px 0 12px;display:flex;flex-direction:column;gap:9px}
.acc-cat{display:flex;gap:0;align-items:flex-start}
.acc-cat-label{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);width:52px;flex-shrink:0;padding-top:5px}
.acc-rows{display:grid;grid-template-columns:repeat(3,1fr);flex:1;border-top:1px solid var(--border-sub);padding-top:2px}
.acc-row{display:flex;align-items:baseline;gap:6px;padding:4px 10px 4px 0}
.acc-key{font-family:var(--mono);font-size:11px;color:var(--text-mute);white-space:nowrap;flex-shrink:0}
.acc-val{font-size:11px;font-weight:600;color:var(--text)}
.val-na{color:var(--text-mute);font-family:var(--mono);font-size:10px;font-weight:400}

/* TABS */
.co-tabs{display:flex;background:#F5F7FA;border-top:1px solid var(--border);margin:0 -32px;padding:0 32px}
.co-tab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--text-mute);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);transition:all .12s}
.co-tab.active{color:var(--text);border-bottom-color:var(--text)}
.co-tab:hover:not(.active){color:var(--text);background:rgba(0,0,0,.03)}

/* CONTENT */
.content-area{flex:1;overflow:hidden}
.tab-panel{display:none}
.tab-panel.active{display:block;overflow-y:auto;height:100%}

/* TIMELINE TAB */
.tl-wrap{padding:22px 32px}
.sec-heading{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:9px;border-bottom:2px solid var(--text)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.chart-card-label{font-size:11px;font-weight:700;color:var(--text);margin-bottom:6px}
.chart-main-val{font-size:22px;font-weight:800;color:var(--text);margin-bottom:2px}
.chart-sub{font-family:var(--mono);font-size:10px;color:var(--teal);margin-bottom:10px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:60px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;height:100%;justify-content:flex-end}
.bar-fill{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.bar-yr{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text-sub);margin-top:3px;text-align:center;line-height:1.3}

/* Ref table */
.ref-section{margin-bottom:22px}
.ref-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ref-table th{background:var(--bg-deep);padding:6px 10px;font-family:var(--mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text-mute);text-align:left;border-bottom:1px solid var(--border)}
.ref-table td{padding:6px 10px;font-size:11px;border-bottom:1px solid var(--border-sub);vertical-align:middle}
.ref-table tr:last-child td{border-bottom:none}
.ref-table td:first-child{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text-mute);white-space:nowrap;width:44px}
.ref-table td:nth-child(2){font-family:var(--mono);font-weight:700;width:100px;white-space:nowrap}
.ref-table td:nth-child(3){width:100px;white-space:nowrap}
.ref-table td:nth-child(4){font-size:10px;color:var(--text-mute);max-width:160px}
/* ソース列 */
.ref-src-cell{display:flex;flex-direction:column;gap:5px}
.ref-src-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-sub);flex-wrap:nowrap}
.ref-src-row a{color:var(--blue);text-decoration:none;font-size:11px;flex-shrink:0}
.ref-src-row a:hover{text-decoration:underline}
.ref-src-badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap;flex-shrink:0}
.rst-official{background:#E5F5F1;color:#0F7A64}
.rst-blog    {background:#E5F5F1;color:#0F7A64}
.rst-press   {background:#FBF0E3;color:#A86010}
.rst-media   {background:#F0ECFF;color:#5A3FBF}
.rst-corp    {background:#E8EFFC;color:#1A5EC2}
.rst-hire    {background:#FEF3C7;color:#92400E}
.rt-o{background:var(--teal-l);color:var(--teal)}.rt-m{background:var(--blue-l);color:var(--blue)}.rt-p{background:var(--amber-l);color:var(--amber)}

/* Topics */
.tl-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tl-filter{padding:3px 9px;border-radius:100px;font-size:10px;font-weight:500;border:1.5px solid;cursor:pointer;transition:all .15s;background:var(--bg);font-family:var(--mono)}
.tl-filter.active{color:#fff !important}
.fa{border-color:var(--border);color:var(--text-sub)}.fa.active{background:var(--text)!important;border-color:var(--text)}
.ff{border-color:var(--blue);color:var(--blue)}.ff.active{background:var(--blue)!important}
.fb{border-color:var(--teal);color:var(--teal)}.fb.active{background:var(--teal)!important}
.fo{border-color:var(--amber);color:var(--amber)}.fo.active{background:var(--amber)!important}
.fw{border-color:var(--purple);color:var(--purple)}.fw.active{background:var(--purple)!important}
.faw{border-color:var(--green);color:var(--green)}.faw.active{background:var(--green)!important}
.ft{border-color:var(--red);color:var(--red)}.ft.active{background:var(--red)!important}
.tl-list{display:flex;flex-direction:column;gap:6px}
.tl-item{display:flex;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:box-shadow .12s}
.tl-item:hover{box-shadow:var(--shadow)}
.tl-item.tl-hidden{display:none}
.tl-left{width:36px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:2px}
.tl-year{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text)}
.tl-dot{width:7px;height:7px;border-radius:50%}
.tl-right{flex:1}
.tl-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.tl-badge{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;font-family:var(--mono)}
.tb-f{background:var(--blue-l);color:var(--blue)}.tb-b{background:var(--teal-l);color:var(--teal)}
.tb-o{background:var(--amber-l);color:var(--amber)}.tb-w{background:var(--purple-l);color:var(--purple)}
.tb-a{background:var(--green-l);color:var(--green)}.tb-t{background:var(--red-l);color:var(--red)}
.tl-retro{font-family:var(--mono);font-size:10px;color:var(--text-mute);background:var(--bg-deep);padding:1px 5px;border-radius:3px;border:1px solid var(--border-sub)}
.tl-speaker{font-family:var(--mono);font-size:11px;color:var(--text-mute)}
.tl-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:3px}
.tl-desc{font-size:12px;color:var(--text-sub);line-height:1.65}
.tl-src-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-family:var(--mono);color:var(--blue);
  margin-top:7px;text-decoration:none;
}
.tl-src-link:hover{text-decoration:underline}

/* ═══════════════ VOICE TAB — 案A カード型 ═══════════════ */
.voice-wrap{padding:20px 28px 80px;display:flex;flex-direction:column;gap:0}

/* 章コンテナ */
.voice-chapter{margin-bottom:22px}

/* サブ項目カード（tl-itemと同構造） */
.v-card{
  background:#fff;border-radius:var(--r);border:1px solid var(--border);
  padding:13px 15px;margin-bottom:8px;
}
.v-card-meta{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.v-card-body{font-size:13px;color:var(--text-sub);line-height:1.85}
.v-card-body strong{color:var(--text);font-weight:700}

/* 小見出しバッジ — 濃い青・白文字 */
.v-badge{
  display:inline-flex;align-items:center;
  padding:2px 9px;border-radius:4px;
  font-size:10px;font-weight:700;font-family:var(--mono);
  background:#1A5EC2;color:#fff;
  white-space:nowrap;
}

/* ソースリンク行（章単位） */
.v-sources{
  display:flex;gap:8px;flex-wrap:wrap;
  padding:10px 13px;
  background:#fff;border-radius:var(--r);border:1px solid var(--border);
  margin-bottom:0;
}
.v-src{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--blue);font-family:var(--mono);
  text-decoration:none;
}
.v-src:hover{text-decoration:underline}

/* VC発言者名 */
.v-speaker{font-size:10px;color:var(--text-mute);font-family:var(--mono);margin-top:6px}
.v-card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:6px}
.v-speaker-inline{font-size:10px;color:var(--text-mute);font-style:italic}

/* スイッチャーとのコンテンツ干渉を防ぐ */
/* ── Timeline内 企業概要セクション ── */
.tl-company-section{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:18px}
.co-biz-desc{font-size:13px;color:var(--text-sub);line-height:1.8;padding:13px 16px 12px;border-bottom:1px solid var(--border-sub)}
.tl-company-section .acc-rows{border-top:none;padding-top:0}
.tl-company-section .acc-categories{padding:10px 16px}
.tl-company-section .co-links-wrap{padding:10px 16px 14px;margin:0}

.tl-wrap{padding-bottom:80px}
.voice-wrap{padding-bottom:80px}

/* ═══════ DARK HEADER (案A) ═══════ */
.co-header{
  background:#0F1C2E;
  border-bottom-color:rgba(255,255,255,.08);
}
.co-header .co-company-name{color:rgba(255,255,255,.55)}
.co-header .co-kpi-label{color:rgba(255,255,255,.45)}
.co-header .co-kpi-val{color:#fff}
.co-header .co-kpi-sub{color:var(--co-color,#00C4CC);opacity:1}
.co-header .co-mission{color:#fff}
.co-header .co-overview{color:rgba(255,255,255,.65)}
.co-header .co-link{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.14);
  color:rgba(255,255,255,.82);
}
.co-header .co-link:hover{
  background:rgba(255,255,255,.15);
  border-color:rgba(255,255,255,.3);
  color:#fff;
}
.co-header .co-link-arrow{color:rgba(255,255,255,.35)}
.co-header .co-link.disabled{opacity:.25}
/* accordion moved to timeline */

.co-header .co-tabs{
  background:rgba(0,0,0,.2);
  border-top:none;
  margin:0;
  padding:8px 24px;
  gap:4px;
}
.co-header .co-tab{
  color:rgba(255,255,255,.45);
  border-radius:100px;
  border-bottom:none;
  margin-bottom:0;
  padding:6px 20px;
  white-space:nowrap;
}
.co-header .co-tab.active{
  color:var(--dark);
  background:#fff;
  border-bottom-color:transparent;
}
.co-header .co-tab:hover:not(.active){
  color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.08);
}
.topbar{
  background:#08111E;
  border-bottom-color:rgba(255,255,255,.07);
}
.topbar a{color:rgba(255,255,255,.5)}
.topbar-name{color:rgba(255,255,255,.75) !important}
.topbar-close{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}

/* ═══════ 案C: タイムラインタブ グレー背景 ═══════ */
#panel-tl{background:#F5F5F5}
#panel-tl .tl-wrap{background:transparent}
#panel-tl .chart-card{background:#fff}
#panel-tl .ref-table{background:#fff}
#panel-tl .tl-item{background:#fff}
#panel-tl .sec-heading{background:transparent}

/* ── 見出しスタイル: 濃いグレー ── */
.sec-heading{
  font-size:13px;font-weight:700;color:var(--text);
  margin-bottom:14px;padding:0 0 0 10px;border-bottom:none;
  border-left:3px solid var(--blue);
  display:flex;align-items:center;gap:0;
  text-transform:none;letter-spacing:normal;font-family:var(--sans);
  line-height:17px;
}
.sec-heading::before{display:none}
/* 参考ソースのアコーディオン */
.ref-accordion-trigger{
  display:flex;align-items:center;
  width:100%;background:none;border:none;
  cursor:pointer;padding:0;margin-bottom:10px;gap:0;
}
.ref-accordion-trigger .sec-heading{
  margin-bottom:0;color:var(--text-mute);
  border-left-color:#BBBBBB;
}
.ref-acc-chevron{font-size:11px;color:#999;transition:transform .2s;margin-left:auto}
.ref-acc-chevron.open{transform:rotate(180deg)}
.ref-accordion-body{overflow:hidden;transition:max-height .28s ease,opacity .22s;max-height:0;opacity:0}
.ref-accordion-body.open{max-height:800px;opacity:1}

/* ── Voice見出し同一行 ── */
.v-hdr{
  padding:18px 28px 16px;
  position:relative;overflow:hidden;
  border-bottom:1px solid #DDE9F7;
  background:#F2F7FD;
  display:flex;align-items:center;gap:10px;
}
.v-hdr-inline{display:flex;align-items:baseline;gap:8px}
.v-hdr-num{
  font-family:var(--mono);font-size:11px;font-weight:700;
  color:#7EB3E8;letter-spacing:.08em;display:inline;
  margin-bottom:0;flex-shrink:0;
}
.v-hdr-label{
  font-size:18px;font-weight:800;line-height:1.3;
  letter-spacing:-.02em;color:var(--text);
  margin-bottom:0;display:inline;
}
.v-hdr-watermark{
  position:absolute;right:-8px;top:50%;transform:translateY(-50%);
  font-size:72px;font-weight:900;color:#7EB3E8;opacity:.1;
  font-family:var(--mono);line-height:1;pointer-events:none;user-select:none;
}

/* ═══════════════ ニュースタブ ═══════════════ */
.news-wrap{padding:20px 24px 80px;min-height:100%}

/* ═══════════════ 企業スイッチャー（下部固定） ═══════════════ */
/* 企業ピッカー */
.picker-fab{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:50;display:flex;align-items:center;gap:8px;
  background:rgba(8,17,30,.92);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.14);
  color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;
  border-radius:100px;padding:11px 20px;cursor:pointer;
  box-shadow:0 6px 24px rgba(0,0,0,.28);transition:all .15s;
}
.picker-fab:hover{background:rgba(8,17,30,1);transform:translateX(-50%) translateY(-1px)}
.picker-fab-ico{font-size:13px}
.picker-overlay{
  position:fixed;inset:0;z-index:200;display:none;
  background:rgba(8,17,30,.45);backdrop-filter:blur(3px);
  align-items:flex-start;justify-content:center;padding:8vh 16px;
}
.picker-overlay.open{display:flex}
.picker-panel{
  width:100%;max-width:520px;background:var(--bg-card,#fff);
  border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.3);
  overflow:hidden;display:flex;flex-direction:column;max-height:80vh;
}
.picker-head{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border,#E2E5EA)}
.picker-search{
  flex:1;border:1px solid var(--border,#E2E5EA);border-radius:8px;
  padding:10px 12px;font-size:14px;font-family:var(--sans);outline:none;
}
.picker-search:focus{border-color:var(--blue,#1A5EC2)}
.picker-close{border:none;background:none;font-size:16px;color:var(--text-mute,#717A86);cursor:pointer;padding:6px 8px}
.picker-count{padding:8px 16px;font-size:11px;color:var(--text-mute,#717A86);border-bottom:1px solid var(--border-sub,#EDEFF2)}
.picker-list{overflow-y:auto;padding:6px}
.picker-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;
}
.picker-item:hover{background:var(--bg-deep,#F5F5F5)}
.picker-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.picker-item-name{font-size:13px;font-weight:600;color:var(--text,#16202E)}

<script>
// ════════════════════════════════════════════════
// DB — Excelデータのみ使用
// ════════════════════════════════════════════════
// ════════════════════════════════════════════════
// DB — data/{company}.json から動的に読み込む
// （企業マスタ xlsx → build_company_json.py で生成したJSONを使用）
// ════════════════════════════════════════════════
let DB = {};

// JSON（build_company_json.py 出力）→ 画面が期待する形へ変換
function adaptCompany(j) {
  // 投資家文字列を整える
  const fund = (j.funding || []).map(f => ({
    year: f.year,
    round: f.round || '非公開',
    amount: (f.amount && f.amount !== '非公開') ? (String(f.amount).match(/[億兆%]/) ? f.amount : f.amount + '億') : (f.amount || '非公開'),
    investors: f.note || '',
    source_text: f.source_text || '',
    source_url: f.source_url || '',
    score: f.score || ''
  }));
  // 社員数 → [[year,count],...]（グラフ用）と、出典つき行（参考ソース用）
  const headRows = (j.headcount || []).filter(h => h.count != null);
  const emp = headRows.map(h => [h.year, h.count]);

  // 参考ソース：社員数・資金調達の source_text / source_url / score から動的生成
  const SCORE_LABEL = { A:'一次情報', B:'メディア等', C:'推定・二次' };
  const refs = [];
  headRows.forEach(h => {
    if (!h.source_text && !h.source_url) return;
    refs.push({ year: h.year, kind: 'emp', cite: h.source_text || '', url: h.source_url || '',
                score: h.score || '', label: SCORE_LABEL[h.score] || (h.score || '') });
  });
  (j.funding || []).forEach(f => {
    if (!f.source_text && !f.source_url) return;
    refs.push({ year: f.year, kind: 'fund', cite: f.source_text || ((f.round||'') + ' ' + (f.amount||'')), url: f.source_url || '',
                score: f.score || '', label: SCORE_LABEL[f.score] || (f.score || '') });
  });

  // トピックス: src/retro へ名称変換（retro は記事年と出来事年の乖離2年以上で true）
  const topics = (j.topics || []).map(t => {
    let retro = false;
    const dm = (t.date || '').match(/(\d{4})/);
    if (dm && t.year) retro = (parseInt(dm[1]) - t.year) >= 2;
    return { year: t.year, type: (t.type || '').split(',')[0].trim(), title: t.title,
             speaker: t.speaker || '', desc: t.desc || '', src: t.url || '', retro };
  });
  // 実績・評判 → perf（最新年の行を採用）
  const perf = { arr:'', clients:'', retention:'', itreview:'', boxil:'', ittrend:'' };
  if (j.metrics && j.metrics.length) {
    const withYear = j.metrics.filter(m => m.year);
    const latest = (withYear.length ? withYear : j.metrics).reduce((a,b)=> (String(b.year) > String(a.year) ? b : a));
    perf.arr = latest.arr || '非開示';
    perf.clients = latest.customers || '';
    perf.retention = latest.retention || '非開示';
  }
  // VC（直近ラウンドの投資家先頭3件）
  let vc = [];
  if (fund.length) {
    const last = fund[fund.length - 1];
    vc = (last.investors || '').split(/[、,]/).map(s=>s.replace(/（.*?）/g,'').trim()).filter(Boolean).slice(0,3);
  }
  const L = j.links || {};
  return {
    company_id: j.company_id,
    name: j.name, color: j.color || '#3A4A5C',
    mission: j.mission || '', summary: j.summary || '',
    biz_desc: j.summary || '',
    raised: j.raised_total || '', rounds: j.latest_round || '',
    hq: j.location || '', domain1: j.sector1 || '', domain2: j.sector2 || '',
    code: j.ticker || '非上場', founded: j.founded || '',
    urls: { corp: L.hp||'', svc: L.service||'', hire: L.recruit||'', deck: L.culture||'', ir: L.ir||'', svc_doc: L.service_doc||'' },
    emp, fund, perf, vc, topics, refs,
    // ニュースタブ用（自動取得設定）
    news_sources: j.news_sources || [], news_links: j.news_links || []
  };
}

// data/{id}.json を取得して DB に格納
// ════════════════════════════════════════════════
// データ取得設定
//  ・GASのWebアプリURL（.../exec）を API_URL に設定すると、
//    スプレッドシート方式（編集が即反映）になります。
//  ・空のままなら、同梱の site/data/{id}.json を読みます（オフライン見本）。
// ════════════════════════════════════════════════
const API_URL = window.STARTUPFILE_API_URL
  || document.documentElement.dataset.apiUrl
  || ''; // 例: 'https://script.google.com/macros/s/XXXX/exec'

async function fetchCompany(id) {
  if (DB[id]) return DB[id];

  // ① GAS API が設定されていれば、そこから1社の詳細を取得
  if (API_URL) {
    try {
      const res = await fetch(`${API_URL}?id=${encodeURIComponent(id)}&t=${Date.now()}`, { cache: 'no-store', redirect: 'follow' });
      if (res.ok) {
        const payload = await res.json();
        if (payload && payload.company) {
          DB[id] = adaptCompany(payload.company);
          return DB[id];
        }
      }
    } catch (e) { /* フォールバックへ */ }
  }

  // ② フォールバック：同梱のローカルJSON（見本用）
  const tries = [`data/${id}.json`, `./data/${id}.json`];
  for (const url of tries) {
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) continue;
      const json = await res.json();
      DB[id] = adaptCompany(json);
      return DB[id];
    } catch (e) { /* next */ }
  }
  return null;
}


// ════════════════════════════════════════════════
// TYPE LABELS & COLORS
// ════════════════════════════════════════════════
const TYPE = {
  founder:{label:'創業・CxO',cls:'tb-f',dot:'var(--blue)'},
  business:{label:'事業',cls:'tb-b',dot:'var(--teal)'},
  org:{label:'組織',cls:'tb-o',dot:'var(--amber)'},
  workstyle:{label:'働き方',cls:'tb-w',dot:'var(--purple)'},
  award:{label:'実績',cls:'tb-a',dot:'var(--green)'},
  turning:{label:'逆境',cls:'tb-t',dot:'var(--red)'},
};

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
let currentId = 'smarthr';
async function loadCompany(id, btn) {
  currentId = id;
  const c = await fetchCompany(id);
  if (!c) {
    document.getElementById('topbar-name').textContent = '読み込みに失敗しました';
    return;
  }
  render(id);
  // Reset tabs
  switchTab('tl', document.querySelector('.co-tab'));
  // Scroll top
  document.querySelector('.content-area').scrollTop = 0;
}

function render(id) {
  const c = DB[id];
  // topbar
  document.getElementById('topbar-name').textContent = c.name;
  // header
  document.getElementById('co-name').textContent = c.name;
  document.querySelector('.co-header').style.setProperty('--co-color', c.color);
  const lastEmp = c.emp[c.emp.length-1];
  document.getElementById('co-emp-val').textContent = lastEmp[1].toLocaleString();
  document.getElementById('co-emp-sub').textContent = `${lastEmp[0]}年時点`;
  document.getElementById('co-raised-val').textContent = c.raised.split('（')[0];
  document.getElementById('co-raised-sub').textContent = c.rounds.length > 40 ? c.rounds.slice(0,40)+'…' : c.rounds;
  const lastFund = c.fund[c.fund.length-1];
  const roundEl = document.getElementById('co-round-val');
  const roundSub = document.getElementById('co-round-sub');
  if(roundEl) roundEl.textContent = lastFund.round;
  if(roundSub) roundSub.textContent = lastFund.year + '年 · ' + lastFund.amount;
  document.getElementById('co-mission').textContent = c.mission;
  document.getElementById('co-overview').textContent = c.summary;

  // Links — アコーディオン下、タブ上に常時表示
  const linkDefs = [
    {label:'コーポレートページ', url:c.urls.corp, icon:'🏢'},
    {label:'サービスページ',     url:c.urls.svc,  icon:'⚙️'},
    {label:'IRページ',           url:c.urls.ir,   icon:'📈'},
    {label:'採用ページ',         url:c.urls.hire, icon:'💼'},
    {label:'カルチャーデック',   url:c.urls.deck, icon:'📄'},
    {label:'サービス資料',       url:c.urls.svc_doc, icon:'📋'},
  ];
  const row1 = linkDefs.slice(0,4);
  const row2 = linkDefs.slice(4);
  const mkLink = ({label,url,icon}) => {
    const a = document.createElement('a');
    a.className = 'co-link' + (url?'':' disabled');
    a.href = url||'#'; if(url) a.target='_blank';
    a.innerHTML = `<span>${icon}</span>${label}<span class="co-link-arrow">${url?'↗':'—'}</span>`;
    return a;
  };
  const linkWrap = document.getElementById('co-links-wrap');
  if(linkWrap) {
    linkWrap.innerHTML = '';
    [row1,row2].forEach(row => {
      const div = document.createElement('div'); div.className='co-links-row';
      row.forEach(l => div.appendChild(mkLink(l)));
      linkWrap.appendChild(div);
    });
  }

  // Biz desc card
  const bizEl = document.getElementById('co-biz-desc');
  if(bizEl) bizEl.textContent = c.biz_desc || '';

  // Accordion
  const perf = c.perf;
  const hasBiz = perf.arr||perf.clients||perf.retention;
  const hasRep = perf.itreview||perf.boxil||perf.ittrend;
  const na = v => v ? `<span class="acc-val">${v}</span>` : `<span class="acc-val val-na">—</span>`;
  document.getElementById('acc-body').innerHTML = `
    <div class="acc-cat">
      <span class="acc-cat-label">基本</span>
      <div class="acc-rows">
        <div class="acc-row"><span class="acc-key">設立年</span>${na(c.founded+'年')}</div>
        <div class="acc-row"><span class="acc-key">所在地</span>${na(c.hq)}</div>
        <div class="acc-row"><span class="acc-key">証券コード</span>${na(c.code)}</div>
        <div class="acc-row"><span class="acc-key">事業区分１</span>${na(c.domain1)}</div>
        <div class="acc-row"><span class="acc-key">事業区分２</span>${na(c.domain2||'—')}</div>
        <div class="acc-row"><span class="acc-key">調達ラウンド数</span>${na(c.fund.length+'ラウンド')}</div>
      </div>
    </div>
    <div class="acc-cat">
      <span class="acc-cat-label">財務</span>
      <div class="acc-rows">
        <div class="acc-row"><span class="acc-key">累計調達額</span>${na(c.raised.split('（')[0])}</div>
        <div class="acc-row"><span class="acc-key">直近調達額</span>${na(c.fund.slice(-1)[0].amount)}</div>
        <div class="acc-row"><span class="acc-key">直近ラウンド</span>${na(c.fund.slice(-1)[0].round)}</div>
      </div>
    </div>
    ${hasBiz?`<div class="acc-cat">
      <span class="acc-cat-label">事業</span>
      <div class="acc-rows">
        <div class="acc-row"><span class="acc-key">ARR</span>${na(perf.arr)}</div>
        <div class="acc-row"><span class="acc-key">導入数</span>${na(perf.clients)}</div>
        <div class="acc-row"><span class="acc-key">継続率</span>${na(perf.retention)}</div>
      </div>
    </div>`:''}
    ${hasRep?`<div class="acc-cat">
      <span class="acc-cat-label">評判</span>
      <div class="acc-rows">
        <div class="acc-row"><span class="acc-key">ITreview</span>${na(perf.itreview?perf.itreview+' / 5.0':'')}</div>
        <div class="acc-row"><span class="acc-key">BOXIL</span>${na(perf.boxil?perf.boxil+' / 5.0':'')}</div>
        <div class="acc-row"><span class="acc-key">ITトレンド</span>${na(perf.ittrend?perf.ittrend+' / 5.0':'')}</div>
      </div>
    </div>`:''}
    <div style="padding:10px 0 2px;border-top:1px solid rgba(0,0,0,.07);margin-top:4px;display:flex;gap:7px;flex-wrap:wrap">
    </div>
  `;

  // Emp chart
  const empMax = Math.max(...c.emp.map(e=>e[1]));
  const empColor = c.color;
  document.getElementById('emp-latest').textContent = lastEmp[1].toLocaleString()+'名';
  document.getElementById('emp-sub2').textContent = lastEmp[0]+'年時点';
  document.getElementById('emp-chart').innerHTML = c.emp.map(([yr,cnt],i,arr)=>{
    const isLast = i===arr.length-1;
    const h = Math.max(2, Math.round((cnt/empMax)*60));
    const op = isLast ? 1 : 0.3 + (i/arr.length)*0.5;
    const label = String(yr).slice(2);
    return `<div class="bar-col">
      <div class="bar-fill" style="height:${h}px;background:${empColor};opacity:${op}"></div>
      <div class="bar-yr">'${label}</div>
    </div>`;
  }).join('');

  // Fund chart
  const fundAmts = c.fund.map(f => {
    const n = parseFloat(String(f.amount).replace('億','').replace('非公開','0').replace('nan','0'));
    return isNaN(n)?0:n;
  });
  const fundMax = Math.max(...fundAmts, 1);
  document.getElementById('fund-summary').textContent = c.raised.split('（')[0];
  document.getElementById('fund-sub').textContent = c.fund.slice(-1)[0].round;
  document.getElementById('fund-chart').innerHTML = c.fund.map((f,i)=>{
    const amt = fundAmts[i];
    const h = amt>0 ? Math.max(4, Math.round((amt/fundMax)*60)) : 3;
    const op = i===c.fund.length-1 ? 1 : 0.3+(i/c.fund.length)*0.5;
    // ラウンド名を読みやすく短縮
    const roundMap = {'シリーズA':'S-A','シリーズB':'S-B','シリーズC':'S-C','シリーズD':'S-D','シリーズE':'S-E',
      'Series A':'S-A','Series B':'S-B','Series C':'S-C','Series D':'S-D','Series E':'S-E',
      'Seed':'Seed','シードA前':'Seed-','シリーズCext.':'S-C+','Series A 1st':'S-A①','Series A 2nd':'S-A②','Series A Final':'S-A③',
      '戦略的出資':'戦略出資','資本業務提携':'業務提携','融資':'融資'};
    let shortLabel = f.round;
    for(const [k,v] of Object.entries(roundMap)){
      if(f.round.startsWith(k)){ shortLabel=v; break; }
    }
    if(shortLabel===f.round) shortLabel = f.round.length>6 ? f.round.slice(0,5)+'…' : f.round;
    return `<div class="bar-col" style="min-width:0">
      <div class="bar-fill" style="height:${h}px;background:var(--blue);opacity:${op}${amt===0?';background:var(--bg-muted)':''}"></div>
      <div class="bar-yr" style="font-size:10px">${shortLabel}<br><span style="font-size:9px;color:var(--text-mute)">'${String(f.year).slice(2)}</span></div>
    </div>`;
  }).join('');

  // Ref table (emp + fund combined)
  const empMap = Object.fromEntries(c.emp.map(([y,n])=>[y,n]));
  const fundMap = {};
  c.fund.forEach(f => { fundMap[f.year] = f; });
  const allYears = [...new Set([...c.emp.map(e=>e[0]),...c.fund.map(f=>f.year)])].sort((a,b)=>b-a);
  // 参考ソースは c.refs（社員数・資金調達の source_text/source_url/score）から動的生成
  const SCORE_BADGE = { A:'rst-official', B:'rst-media', C:'rst-blog' };
  const refsByYear = {};
  (c.refs || []).forEach(r => { (refsByYear[r.year] = refsByYear[r.year] || []).push(r); });

  document.getElementById('ref-tbody').innerHTML = allYears.map(yr=>{
    const empVal = empMap[yr] ? empMap[yr].toLocaleString()+'名' : '—';
    const f = fundMap[yr];
    const fundStr = f ? `${f.round} ${f.amount}` : '—';
    const invStr  = f ? (f.investors||'').slice(0,44)+((f.investors||'').length>44?'…':'') : '';
    // ソース列: c.refs（スプレッドシート由来）から該当年を取得
    const srcEntries = (refsByYear[yr] || []);
    const srcCell = srcEntries.length > 0
      ? `<div class="ref-src-cell">${srcEntries.map(s=>`
          <div class="ref-src-row">
            ${s.label ? `<span class="ref-src-badge ${SCORE_BADGE[s.score]||'rst-media'}">${s.label}</span>` : ''}
            <span>${s.cite}</span>
            ${s.url ? `<a href="${s.url}" target="_blank">↗</a>` : ''}
          </div>`).join('')}</div>`
      : '—';
    return `<tr>
      <td>${yr}</td>
      <td>${empVal}</td>
      <td>${fundStr}</td>
      <td style="font-size:10px;color:var(--text-mute)">${invStr}</td>
      <td>${srcCell}</td>
    </tr>`;
  }).join('');
  // Topics
  document.getElementById('tl-list').innerHTML = [...c.topics].reverse().map(t=>{
    const type = t.type.split(',')[0].trim();
    const ti = TYPE[type]||{label:type,cls:'tb-b',dot:'var(--teal)'};
    return `<div class="tl-item" data-t="${t.type}">
      <div class="tl-left">
        <div class="tl-year">${t.year}</div>
        <div class="tl-dot" style="background:${ti.dot}"></div>
      </div>
      <div class="tl-right">
        <div class="tl-meta">
          <span class="tl-badge ${ti.cls}">${ti.label}</span>
          ${t.retro?'<span class="tl-retro">回顧</span>':''}
          ${t.speaker?`<span class="tl-speaker">${t.speaker}</span>`:''}
        </div>
        <div class="tl-title">${t.title}</div>
        <div class="tl-desc">${t.desc}</div>
        ${t.src ? `<a class="tl-src-link" href="${t.src}" target="_blank">情報ソースを読む →</a>` : ''}
      </div>
    </div>`;
  }).join('');

  // Reset topic filter
  document.querySelectorAll('.tl-filter').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tl-filter.fa').classList.add('active');
  document.querySelectorAll('#tl-list .tl-item').forEach(i=>i.classList.remove('tl-hidden'));

  // Voice: トピックスから動的生成（全企業共通）
  renderVoice(c);
}

// ════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════
function toggleRefAcc(btn) {
  const body = btn.nextElementSibling;
  const chev = btn.querySelector('.ref-acc-chevron');
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  if(chev) chev.classList.toggle('open', !open);
}
function switchTab(id, btn) {
  document.querySelectorAll('.co-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>{ p.classList.remove('active'); p.scrollTop=0; });
  const activeBtn = btn || document.querySelector(`.co-tab[onclick*="${id}"]`);
  if(activeBtn) activeBtn.classList.add('active');
  const panel = document.getElementById('panel-'+id);
  panel.classList.add('active');
  panel.scrollTop = 0;
  if(id==='news') renderNews(currentId);
}
function filterTL(type, btn) {
  document.querySelectorAll('.tl-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#tl-list .tl-item').forEach(item=>{
    item.classList.toggle('tl-hidden', type!=='all' && !item.dataset.t.includes(type));
  });
}
function toggleAcc(btn) {
  const body = btn.nextElementSibling;
  const chev = btn.querySelector('.accordion-chevron');
  const open = body.classList.contains('open');
  body.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}

</script>
<script>
// ── SmartHR Voice — Rich Design (from public URLs) ──
// Sources: smarthr.co.jp / app.smarthr.jp / smarthr.co.jp/recruit/ / speakerdeck.com/smarthr_pr/
// ════════════════════════════════════════════════
// Voice — トピックス（スプレッドシート）から動的生成
//  各見出しに該当typeのトピックスを振り分けて表示。静的データは持たない。
// ════════════════════════════════════════════════
const VOICE_CHAPTERS = [
  { no:'01', title:'創業のきっかけ・感じる課題', types:['founder','turning'] },
  { no:'02', title:'マーケット・事業',           types:['business'] },
  { no:'03', title:'組織・働き方',               types:['org','workstyle'] },
  { no:'04', title:'実績・外部評価',             types:['award'] },
];

function renderVoice(c) {
  const wrap = document.getElementById('voice-wrap-main');
  if (!wrap) return;
  const topics = c.topics || [];
  const used = new Set();
  let html = '';

  VOICE_CHAPTERS.forEach(ch => {
    // 該当typeのトピックスを年降順で
    const items = topics
      .filter(t => ch.types.indexOf((t.type||'').split(',')[0].trim()) >= 0)
      .sort((a,b) => (b.year||0) - (a.year||0));
    if (!items.length) return; // 該当が無い見出しは出さない
    items.forEach(t => used.add(t));
    html += `
      <div class="voice-chapter">
        <div class="sec-heading">${ch.no}　${ch.title}</div>
        ${items.map(t => `
          <div class="v-card">
            <div class="v-card-meta">
              ${t.year ? `<span class="v-badge">${t.year}</span>` : ''}
              ${t.speaker ? `<span class="v-speaker-inline">${t.speaker}</span>` : ''}
            </div>
            <div class="v-card-title">${t.title || ''}</div>
            <div class="v-card-body">${t.desc || ''}</div>
            ${t.url ? `<div class="v-sources"><a class="v-src" href="${t.url}" target="_blank">📎 情報ソースを読む ↗</a></div>` : ''}
          </div>`).join('')}
      </div>`;
  });

  if (!html) {
    html = `<div class="voice-chapter"><div class="v-card"><div class="v-card-body" style="color:var(--text-mute)">この企業のトピックスはまだ登録されていません。</div></div></div>`;
  }
  wrap.innerHTML = html;
}

function renderNews(id) {
  const wrap = document.getElementById('news-wrap');
  if (!wrap) return;

  // 全企業で情報集約ダッシュボードを表示（収集元は企業JSONの設定を併記）
  const c = DB[id] || {};
  const srcList = (c.news_sources || []).filter(s => s.mode !== 'gnews');
  const linkList = c.news_links || [];
  const srcChips = [...srcList.map(s => s.label), ...linkList.map(s => s.label)]
    .filter((v, i, a) => a.indexOf(v) === i)
    .map(l => `<span class="ns-chip">${l}</span>`).join('');

  wrap.innerHTML = `<div id="smnews">
<main class="board" id="board"></main>
<div class="ns-config">
  <div class="ns-config-h">この企業の収集元（自動更新の対象）</div>
  <div class="ns-config-chips">${srcChips || '<span class="ns-chip">設定なし</span>'}</div>
</div>
<div class="disclaimer" id="disclaimer"></div>
</div>`;
  _smNewsInited = false;
  if (typeof initSmNews === 'function') initSmNews();
  return;
}

// ── 初期表示 ──────────────────────────────────────────────────
// ════════════════════════════════════════════════
// 企業ピッカー（全社対応）
// ════════════════════════════════════════════════
let COMPANY_INDEX = [];   // [{company_id,name,color,summary,sector1,founded}]

async function loadCompanyIndex() {
  const tries = ['data/index.json', './data/index.json'];
  // GAS方式なら API_URL（一覧）も使える
  if (API_URL) tries.unshift(`${API_URL}?t=${Date.now()}`);
  for (const url of tries) {
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) continue;
      const j = await res.json();
      if (Array.isArray(j.companies)) { COMPANY_INDEX = j.companies; return; }
    } catch (e) { /* next */ }
  }
}

function dotColor(c){ return c && /^#/.test(c) ? c : 'var(--slate,#5A6A80)'; }

function renderPickerList(filter) {
  const list = document.getElementById('picker-list');
  const cnt = document.getElementById('picker-count');
  const q = (filter || '').trim().toLowerCase();
  const items = COMPANY_INDEX.filter(c =>
    !q || (c.name||'').toLowerCase().includes(q) || (c.summary||'').toLowerCase().includes(q) || (c.sector1||'').toLowerCase().includes(q)
  );
  cnt.textContent = `${items.length} 社`;
  if (!items.length) { list.innerHTML = `<div class="picker-empty">該当する企業がありません</div>`; return; }
  list.innerHTML = items.slice(0, 300).map(c => `
    <div class="picker-item" onclick="pickCompany('${c.company_id}')">
      <span class="picker-dot" style="background:${dotColor(c.color)}"></span>
      <div>
        <div class="picker-item-name">${c.name||c.company_id}</div>
        <div class="picker-item-sub">${[c.sector1, c.summary].filter(Boolean).join(' · ').slice(0,60)}</div>
      </div>
    </div>`).join('') + (items.length > 300 ? `<div class="picker-empty">他 ${items.length-300} 社… 検索で絞り込んでください</div>` : '');
}

function openPicker(){ document.getElementById('picker-overlay').classList.add('open'); const s=document.getElementById('picker-search'); s.value=''; renderPickerList(''); setTimeout(()=>s.focus(),50); }
function closePicker(){ document.getElementById('picker-overlay').classList.remove('open'); }
function filterPicker(){ renderPickerList(document.getElementById('picker-search').value); }
async function pickCompany(id){
  closePicker();
  await loadCompany(id);
  const c = DB[id];
  const lbl = document.getElementById('picker-fab-label');
  if (lbl && c) lbl.textContent = c.name;
}

// ── 初期化：一覧を読み、先頭（またはSmartHR）を表示 ──
(async function init(){
  await loadCompanyIndex();
  let firstId = 'c0001';
  if (COMPANY_INDEX.length) {
    const sm = COMPANY_INDEX.find(c => /smarthr/i.test(c.name||'') || /smarthr/i.test(c.company_id||''));
    firstId = sm ? sm.company_id : COMPANY_INDEX[0].company_id;
  }
  await loadCompany(firstId);
  const c = DB[firstId];
  const lbl = document.getElementById('picker-fab-label');
  if (lbl && c) lbl.textContent = c.name;
})();
(function(){
  const btn = document.querySelector('.accordion-trigger');
  if (btn) toggleAcc(btn);
})();


// ===== SmartHR News Dashboard (injected) =====
let _smNewsInited = false;
function initSmNews() {
  if (_smNewsInited) return;
  _smNewsInited = true;

// ════════════════════════════════════════════════
//  情報源（収集元）定義 ＋ 期間カラム定義
// ════════════════════════════════════════════════
const SVG = {
  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  ext:'<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/>',
};

// 収集元（バッジの色つき）。本番はそれぞれのRSS/APIから取得。
const SRC = {
  official: {label:'公式サイトRSS',      color:'#1A5EC2'},
  pr:       {label:'PR TIMES',          color:'#E8632B'},
  gnews:    {label:'GoogleニュースRSS',  color:'#137333'},
  ipforce:  {label:'IP Force',          color:'#5A3FBF'},
  jglobal:  {label:'J-GLOBAL',          color:'#0E8A78'},
  blog:     {label:'公式ブログRSS',      color:'#9A580E'},
  note:     {label:'note RSS',          color:'#2BA693'},
};

// 期間カラム（縦積み）。直近1ヶ月 / 1年 / 3年。重複なしの区間で振り分け。
const PERIODS = [
  {id:'m1',  title:'直近1ヶ月', sub:'過去30日以内に公開された情報'},
  {id:'y1',  title:'直近1年',   sub:'1ヶ月超〜1年以内に公開された情報'},
  {id:'y3',  title:'直近3年',   sub:'1年超〜3年以内に公開された情報'},
];

const INITIAL_SHOW = 10; // 11件以上はアコーディオン（10件表示→残りを展開）

// ════════════════════════════════════════════════
//  フィード（収集元横断のサンプル。本番は各RSS/APIから自動取得）
//  date は YYYY-MM-DD。src は SRC のキー。
// ════════════════════════════════════════════════
// ↓ 既定はオフライン用サンプル。本番では data/{company}.json を読み込んで置き換える。

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate = s => { if(!s) return ''; const d=new Date(s); return isNaN(d)? s : `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };

// 基準日からの「○ヶ月前」境界を返す
function monthsAgo(n){ const d=new Date(); d.setMonth(d.getMonth()-n); return d; }

// FEEDを期間ごとに振り分け（重複なし区間）。各カラム内は新しい順。
function bucketize(){
  const b1 = monthsAgo(1);   // 1ヶ月前
  const b12 = monthsAgo(12); // 1年前
  const b36 = monthsAgo(36); // 3年前
  const buckets = {m1:[], y1:[], y3:[]};
  FEED.forEach(it=>{
    const d = new Date(it.date);
    if(isNaN(d)) return;
    if(d >= b1)        buckets.m1.push(it);
    else if(d >= b12)  buckets.y1.push(it);
    else if(d >= b36)  buckets.y3.push(it);
  });
  Object.values(buckets).forEach(arr=>arr.sort((a,b)=> new Date(b.date)-new Date(a.date)));
  return buckets;
}

function srcBadge(srcKey){
  const s = SRC[srcKey];
  if(!s) return '';
  return `<span class="item-tag item-src" style="background:${s.color}1A;color:${s.color}">${esc(s.label)}</span>`;
}

function itemRow(it, i){
  return `<a class="item" href="${it.url}" target="_blank" rel="noopener">
    <span class="item-rank">${i+1}</span>
    <div class="item-main">
      <div class="item-title">${esc(it.title)}</div>
      <div class="item-foot">
        ${it.date?`<span class="item-date">${fmtDate(it.date)}</span>`:''}
        ${srcBadge(it.src)}
      </div>
    </div>
  </a>`;
}

// 期間カラム1つ分のHTML。11件以上は10件表示＋アコーディオン。
function periodCol(p, items){
  const total = items.length;
  const head = `
    <div class="col-head">
      <div class="col-title-row">
        <div class="col-icon" style="background:var(--ink)"><svg class="ic" viewBox="0 0 24 24">${SVG.cal}</svg></div>
        <div>
          <div class="col-title">${p.title}</div>
          <div class="col-source">${p.sub}</div>
        </div>
        <span class="status sample" style="background:var(--blue-l);color:var(--blue)">${total}件</span>
      </div>
    </div>`;

  if(!total){
    return `<section class="col" id="col-${p.id}">${head}
      <div class="col-body"><div class="skeleton" style="grid-column:1/-1;color:var(--mute);font-size:11px;text-align:center;padding:24px">該当する情報がありません</div></div>
    </section>`;
  }

  const visible = items.slice(0, INITIAL_SHOW);
  const hidden  = items.slice(INITIAL_SHOW);
  const visibleHtml = visible.map((it,idx)=>itemRow(it, idx)).join('');
  const hiddenHtml  = hidden.map((it,idx)=>itemRow(it, INITIAL_SHOW+idx)).join('');

  const accordion = hidden.length ? `
    <div class="col-body acc-hidden" id="more-${p.id}" hidden>${hiddenHtml}</div>
    <div class="col-foot">
      <button type="button" class="more-btn" data-target="more-${p.id}" onclick="toggleMore(this)">
        残り${hidden.length}件を表示 <svg class="ic chev" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>` : '';

  return `<section class="col" id="col-${p.id}">${head}
    <div class="col-body">${visibleHtml}</div>
    ${accordion}
  </section>`;
}

// アコーディオン開閉
function toggleMore(btn){
  const panel = document.getElementById(btn.dataset.target);
  if(!panel) return;
  const isOpen = !panel.hasAttribute('hidden');
  if(isOpen){
    panel.setAttribute('hidden','');
    btn.classList.remove('open');
    const n = panel.querySelectorAll('.item').length;
    btn.innerHTML = `残り${n}件を表示 <svg class="ic chev" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M6 9l6 6 6-6"/></svg>`;
  }else{
    panel.removeAttribute('hidden');
    btn.classList.add('open');
    btn.innerHTML = `折りたたむ <svg class="ic chev" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M18 15l-6-6-6 6"/></svg>`;
  }
}
window.toggleMore = toggleMore;

// バッチ出力（data/{company}.json）の items を、ページ内の {date, src, title, url} 形へ変換。
// JSON側 source キー → ページ側 src キーへマップ（収集元バッジに対応）。
const SRC_MAP = { official:'official', prtimes:'pr', gnews:'gnews', blog:'blog', note:'note', ipforce:'ipforce', jglobal:'jglobal' };
function adoptFeed(json){
  if(!json || !Array.isArray(json.items)) return false;
  FEED = json.items.map(it=>({
    date: it.date ? String(it.date).slice(0,10) : '',
    src:  SRC_MAP[it.source] || it.source || 'official',
    title: it.title || '',
    url:  it.url || '#',
  })).filter(x=>x.title && x.date);
  return true;
}

// data/{company}.json を取得。取得できなければ既定サンプルのまま（オフライン動作）。
// 取得元は data/ 配下の相対パス（GitHub Pages等にページとdataを一緒に置く前提）。
async function loadFeedData(companyId){
  const candidates = [
    `data/${companyId}.json`,
    `./data/${companyId}.json`,
  ];
  for(const url of candidates){
    try{
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) continue;
      const json = await res.json();
      if(adoptFeed(json)){
        const dc = document.getElementById('disclaimer');
        if(dc && json.updated_at){
          dc.insertAdjacentHTML('afterbegin', `<div style="margin-bottom:8px;color:var(--green);font-weight:600">● 自動取得データ（最終更新 ${fmtDate(json.updated_at)}）</div>`);
        }
        return true;
      }
    }catch(e){ /* 次の候補へ */ }
  }
  return false; // フォールバック（サンプル表示）
}

// ── 全体ロード ──
function renderBoard(){
  const buckets = bucketize();
  document.getElementById('board').innerHTML = PERIODS.map(p=>periodCol(p, buckets[p.id])).join('');
}
async function loadAll(){
  const btn=document.getElementById('refresh');
  if(btn) btn.classList.add('spin');
  renderBoard(); // まず手元データ（サンプル）で即描画
  const ok = await loadFeedData(currentId); // 自動取得データがあれば差し替え（無ければサンプル）
  if(ok) renderBoard();
  if(btn) btn.classList.remove('spin');
}
