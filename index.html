<body>
<header class="topbar">
  <strong>StartupFile</strong>
  <span class="tagline">日本のスタートアップの変化を発見する</span>
  <nav>
    <button class="view-tab active" data-action="goTop">Top</button>
    <button class="view-tab" data-action="focusSearch">Companies</button>
  </nav>
</header>
<div id="app"><div class="loading">読み込み中...</div></div>
<footer class="footer">StartupFile / Dynamic DB Prototype</footer>
<script>
(function(){
'use strict';

var API_URL = window.STARTUPFILE_API_URL || document.documentElement.dataset.apiUrl || '';
var STATE = { top:null, companies:[], companyMap:{}, companyCache:{}, currentId:null, search:'' };
var $app = document.getElementById('app');

function $(sel, root){ return (root || document).querySelector(sel); }
function $all(sel, root){ return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }
function esc(v){ return String(v == null ? '' : v).replace(/[&<>'"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]; }); }
function clean(v){ return String(v == null ? '' : v).trim(); }
function num(v){ var n = Number(v); return isFinite(n) ? n : null; }
function color(v){ return /^#[0-9a-fA-F]{3,8}$/.test(clean(v)) ? v : '#12345A'; }
function idOf(x){ return clean(x && (x.cid || x.company_id || x.id)); }
function truncate(v,n){ v=clean(v); return v.length>n ? v.slice(0,n-1)+'…' : v; }
function fmt(v, fallback){ v=clean(v); return v || (fallback || '—'); }
function typeLabel(type){
  var t = clean(type).split(',')[0];
  var map = {business:'事業',product:'サービス',org:'組織',workstyle:'働き方',founder:'創業',turning:'転換点',award:'実績',case:'導入事例',customer:'顧客',management:'経営',partnership:'提携',alliance:'提携',culture:'カルチャー',value:'価値観',vision:'ビジョン'};
  return map[t] || t || 'トピックス';
}
function apiUrl(params){
  if(!API_URL) throw new Error('HTML の data-api-url に GAS の /exec URL を設定してください。');
  var u = new URL(API_URL);
  Object.keys(params || {}).forEach(function(k){ if(params[k] !== undefined && params[k] !== null && params[k] !== '') u.searchParams.set(k, params[k]); });
  return u.toString();
}
async function fetchJson(params){
  var res = await fetch(apiUrl(params), {cache:'no-store'});
  if(!res.ok) throw new Error('API error: '+res.status);
  var json = await res.json();
  if(json && json.error) throw new Error(json.error);
  return json;
}
function showError(err){
  console.warn(err);
  $app.innerHTML = '<div class="error"><b>読み込みに失敗しました。</b><br>'+esc(err && err.message || err)+'<br><br><span style="color:#4C5B6E">GASの公開設定、data-api-url、スプレッドシートのシート名を確認してください。</span></div>';
}
function setTopActive(isTop){
  $all('.view-tab').forEach(function(b){ b.classList.toggle('active', b.dataset.action === (isTop ? 'goTop' : 'focusSearch')); });
}

async function init(){
  try{
    await loadTop();
    route();
    window.addEventListener('hashchange', route);
  }catch(err){ showError(err); }
}
async function loadTop(){
  var data;
  try{ data = await fetchJson({toppage:1}); }
  catch(e){
    console.warn('toppage failed; fallback to index', e);
    var idx = await fetchJson({});
    data = {meta:idx.meta||{}, companies:idx.companies||[], shelves:{}, top_sections:{}};
  }
  STATE.top = data || {};
  STATE.companies = (STATE.top.companies || []).filter(function(c){ return idOf(c); });
  STATE.companyMap = {};
  STATE.companies.forEach(function(c){ STATE.companyMap[idOf(c)] = c; });
}
function route(){
  var h = location.hash || '';
  var m = h.match(/^#\/?company\/?([^?]+)/);
  if(m){ loadAndRenderCompany(decodeURIComponent(m[1])); return; }
  renderTop();
}
function goCompany(id){ if(!id) return; location.hash = '#/company/' + encodeURIComponent(id); }
function goTop(){ history.replaceState(null,'', location.pathname + location.search); renderTop(); }

function renderTop(){
  setTopActive(true);
  var meta = STATE.top.meta || {};
  var sections = STATE.top.top_sections || {};
  var shelves = STATE.top.shelves || {};
  var featured = (sections.weekly && (sections.weekly.later_stage || sections.weekly.early_stage)) ? [] : (shelves.featured || []);

  $app.innerHTML = ''+
    '<section class="hero"><div class="hero-inner">'+
      '<div class="eyebrow">STARTUPFILE / DB PROTOTYPE</div>'+
      '<h1>企業の変化を、<em>数字・出来事・資料</em>から見つける。</h1>'+
      '<p>資金調達、社員数推移、トピックス、ニュース、公式資料をもとに、日本のスタートアップを確認しながら育てていくための個人用データベースです。</p>'+
      '<div class="hero-actions"><button class="btn primary" data-action="focusSearch">企業を探す</button><button class="btn secondary" data-action="refreshTop">再読み込み</button></div>'+
      '<div class="hero-tags" id="heroTags"></div>'+
      '<div class="hero-stats">'+
        '<div><div class="hero-stat-label">COMPANIES</div><div class="hero-stat-val">'+esc(meta.company_count || meta.companyCount || STATE.companies.length)+'</div></div>'+
        '<div><div class="hero-stat-label">TOPICS</div><div class="hero-stat-val">'+esc(meta.topic_count || '—')+'</div></div>'+

$app.addEventListener('click', function(e){
  var noNav = e.target.closest('[data-no-nav]'); if(noNav) return;
  var action = e.target.closest('[data-action]');
  if(action){
    var a = action.dataset.action;
    if(a === 'goTop'){ e.preventDefault(); goTop(); }
    if(a === 'focusSearch'){ e.preventDefault(); var input = $('.sb-search'); if(input) input.focus(); else { location.hash = '#/company/' + idOf(STATE.companies[0]||{}); } }
    if(a === 'refreshTop'){ e.preventDefault(); location.reload(); }
    return;
  }
  var card = e.target.closest('[data-company]');
  if(card){ e.preventDefault(); goCompany(card.dataset.company); return; }
  var sector = e.target.closest('[data-sector]');
  if(sector){ STATE.search = sector.dataset.sector; location.hash = '#/company/' + idOf(filterCompanies(STATE.search)[0] || STATE.companies[0] || {}); }
});
$app.addEventListener('input', function(e){
  if(e.target.classList.contains('sb-search')){
    STATE.search = e.target.value;
    var sb = $('.sidebar');
    if(sb) sb.innerHTML = renderSidebarHtml(STATE.currentId);
    var next = $('.sb-search'); if(next){ next.focus(); next.setSelectionRange(STATE.search.length, STATE.search.length); }
  }
});

document.addEventListener('click', function(e){
  var action = e.target.closest('[data-action]');
  if(action && action.dataset.action === 'goTop'){ e.preventDefault(); goTop(); }
});

init();
})();
</script>
</body>
</html>
